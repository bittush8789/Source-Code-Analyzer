apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: source-code-analyzer
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/bittush8789/Source-Code-Analyzer.git
    targetRevision: HEAD
    path: kubernetes/prod
  destination:
    server: https://kubernetes.default.svc
    namespace: source-code-analyzer
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
